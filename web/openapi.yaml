openapi: "3.0.3"

info:
  title: Governor OS Web API
  description: |
    REST API for the Governor OS compliance platform.

    Regulated-industry customers (Fintech, MedTech, GovTech) use this API to:
    - Verify GitHub Actions OIDC tokens and obtain session tokens
    - Submit release metadata for compliance audit and governance verdict generation
    - Retrieve audit job status and results
    - Manage the organization registry (admin operations)

    Security model:
    - Audit and verify endpoints accept a `Bearer` token that is either a
      short-lived HMAC-signed session token (obtained via `/api/v1/compliance/verify`)
      or a long-lived license key.
    - Admin endpoints accept a `Bearer` token matching the `ADMIN_SECRET`
      environment variable. When `ADMIN_SECRET` is not configured the endpoints
      return `503 Service Unavailable`.
  version: "1.0.0"
  contact:
    name: Governor OS Support
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000
    description: Local development / self-hosted container

tags:
  - name: health
    description: Server liveness check
  - name: compliance
    description: OIDC verification and audit trail generation
  - name: admin
    description: Organization registry and job management (requires ADMIN_SECRET)

# ---------------------------------------------------------------------------
# Reusable security schemes
# ---------------------------------------------------------------------------

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        For compliance endpoints: a short-lived session JWT (from `/api/v1/compliance/verify`)
        or a long-lived license key.

        For admin endpoints: the value of the `ADMIN_SECRET` environment variable.

  # ---------------------------------------------------------------------------
  # Reusable schemas
  # ---------------------------------------------------------------------------

  schemas:

    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
          example: false
        error:
          type: string
          description: Human-readable error message
          example: "Missing required fields: oidcToken, organizationId, serviceAccountId, federationRuleId"

    OrgEntry:
      type: object
      required: [id, allowedSubs]
      properties:
        id:
          type: string
          description: Unique organization identifier
          example: "acme-corp"
        allowedSubs:
          type: array
          items:
            type: string
          description: |
            OIDC `sub` claim patterns. Trailing-wildcard globs are supported
            (e.g. `"repo:acme/*"`).
          example: ["repo:acme/backend:*", "repo:acme/frontend:*"]

    OrgRegistrationRequest:
      type: object
      required: [id, licenseKey, allowedSubs]
      properties:
        id:
          type: string
          description: Unique organization identifier
          example: "acme-corp"
        licenseKey:
          type: string
          description: License key issued to the organization. Write-only — never returned by GET endpoints.
          example: "gos_live_abc123def456"
        allowedSubs:
          type: array
          minItems: 1
          items:
            type: string
          description: |
            OIDC `sub` claim patterns allowed for this organization.
            Trailing-wildcard globs are supported (e.g. `"repo:acme/*"`).
          example: ["repo:acme/backend:*", "repo:acme/frontend:*"]

    AuditJobSummary:
      type: object
      required: [jobId, repository, tag, status, submittedAt]
      properties:
        jobId:
          type: string
          description: Unique audit job identifier
          example: "audit-acme_widgets-v1.2.0-1748692800000"
        repository:
          type: string
          description: GitHub repository in `owner/repo` format
          example: "acme/widgets"
        tag:
          type: string
          description: Release tag
          example: "v1.2.0"
        status:
          type: string
          enum: [queued, complete]
          example: "complete"
        submittedAt:
          type: string
          format: date-time
          example: "2026-05-31T12:00:00.000Z"
        completedAt:
          type: string
          format: date-time
          example: "2026-05-31T12:00:01.234Z"

    GovernanceVerdict:
      type: object
      required: [verdict, reason]
      properties:
        verdict:
          type: string
          enum: [approved, conditional, blocked]
          description: |
            - `approved` — fully published, non-draft production release
            - `conditional` — pre-release; manual review recommended
            - `blocked` — draft release; cannot be approved until published
          example: "approved"
        reason:
          type: string
          example: "Release meets Governor OS governance requirements."

    AuditResult:
      type: object
      required: [auditTrailId, repository, release, completedAt]
      properties:
        auditTrailId:
          type: string
          example: "audit-acme_widgets-v1.2.0-1748692800000"
        repository:
          type: string
          example: "acme/widgets"
        release:
          type: object
          required: [tag]
          properties:
            tag:
              type: string
              example: "v1.2.0"
            publishedAt:
              type: string
              format: date-time
              nullable: true
              example: "2026-05-31T12:00:00.000Z"
            author:
              type: string
              nullable: true
              example: "octocat"
        governanceVerdict:
          $ref: '#/components/schemas/GovernanceVerdict'
        isoControlMapping:
          type: object
          description: ISO 27001 / SOC2 control cross-reference (present when `requested.isoControlMapping` is true)
          additionalProperties:
            type: string
          example:
            CC6.1: "Change management: Release tag and metadata captured."
            CC7.2: "System monitoring: CI workflow completion linked to release."
            CC8.1: "Change management: Release notes and issue references reviewed."
        evidencePdf:
          type: object
          description: Evidence PDF status (present when `requested.evidencePdf` is true)
          properties:
            status:
              type: string
              example: "pending"
            message:
              type: string
              example: "PDF generation is not yet available in this tier."
        completedAt:
          type: string
          format: date-time
          example: "2026-05-31T12:00:01.234Z"

    AuditJobResponse:
      type: object
      required: [success, jobId, status, message]
      properties:
        success:
          type: boolean
          example: true
        jobId:
          type: string
          example: "audit-acme_widgets-v1.2.0-1748692800000"
        status:
          type: string
          enum: [queued, complete]
          example: "complete"
        message:
          type: string
          example: "Audit complete for acme/widgets@v1.2.0."
        result:
          $ref: '#/components/schemas/AuditResult'

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------

paths:

  /health:
    get:
      tags: [health]
      summary: Server health check
      description: Returns `200 OK` with service metadata when the server is healthy.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, service, version]
                properties:
                  status:
                    type: string
                    enum: [ok]
                    example: "ok"
                  service:
                    type: string
                    example: "governor-os-web"
                  version:
                    type: string
                    example: "1.0.0"

  /openapi.yaml:
    get:
      tags: [health]
      summary: OpenAPI specification
      description: Returns this OpenAPI 3.0 specification document as `text/yaml`.
      operationId: getOpenApiSpec
      security: []
      responses:
        "200":
          description: OpenAPI spec document
          content:
            text/yaml:
              schema:
                type: string
        "503":
          description: Spec file unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/compliance/verify:
    post:
      tags: [compliance]
      summary: Verify GitHub Actions OIDC token and issue session token
      description: |
        Validates the short-lived OIDC JWT issued by GitHub Actions against the
        GitHub JWKS endpoint, then issues an HMAC-signed session token valid for
        1 hour. The session token can be used as the `Authorization: Bearer`
        credential for subsequent audit calls.

        **Rate limit:** 10 requests per 5 minutes per IP.
      operationId: verifyOidc
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oidcToken, organizationId, serviceAccountId, federationRuleId]
              properties:
                oidcToken:
                  type: string
                  description: Short-lived GitHub Actions OIDC JWT
                  example: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9..."
                organizationId:
                  type: string
                  description: Governor OS tenant identifier
                  example: "acme-corp"
                serviceAccountId:
                  type: string
                  description: CI service account identifier
                  example: "ci-release-bot"
                federationRuleId:
                  type: string
                  description: OIDC `sub` prefix or pattern to match
                  example: "repo:acme/widgets:"
      responses:
        "200":
          description: OIDC token verified; session token issued
          content:
            application/json:
              schema:
                type: object
                required: [success, sessionToken, expiresIn, message]
                properties:
                  success:
                    type: boolean
                    example: true
                  sessionToken:
                    type: string
                    description: HMAC-signed JWT valid for 1 hour
                    example: "eyJhbGciOiJIUzI1NiJ9..."
                  expiresIn:
                    type: integer
                    description: Token lifetime in seconds
                    example: 3600
                  message:
                    type: string
                    example: "OIDC token verified. Session token issued."
        "400":
          description: Missing or invalid request fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: OIDC token verification failed or sub does not match federation rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Organization not registered in the registry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "503":
          description: JWKS endpoint temporarily unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/compliance/audit:
    post:
      tags: [compliance]
      summary: Submit a release for compliance audit
      description: |
        Receives release metadata from the GitHub Action (premium tier) and
        synchronously generates a governance verdict with ISO control mapping.
        Returns a job ID immediately with `202 Accepted`; poll the
        `GET /api/v1/compliance/audit/{jobId}` endpoint to retrieve the result.

        **Authentication:** `Authorization: Bearer <session-token | license-key>`

        **Rate limit:** 30 requests per minute per IP.
      operationId: submitAudit
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [schemaVersion, repository, release]
              properties:
                schemaVersion:
                  type: string
                  description: Payload schema version for forward compatibility
                  example: "1.0"
                repository:
                  type: string
                  description: GitHub repository in `owner/repo` format
                  example: "acme/widgets"
                release:
                  type: object
                  required: [tag]
                  properties:
                    tag:
                      type: string
                      example: "v1.2.0"
                    name:
                      type: string
                      example: "Spring Release"
                    isPrerelease:
                      type: boolean
                      example: false
                    isDraft:
                      type: boolean
                      example: false
                    publishedAt:
                      type: string
                      format: date-time
                      nullable: true
                      example: "2026-05-31T12:00:00.000Z"
                    author:
                      type: string
                      nullable: true
                      example: "octocat"
                requested:
                  type: object
                  description: Optional flags to request additional audit artifacts
                  properties:
                    isoControlMapping:
                      type: boolean
                      description: Include ISO 27001 / SOC2 control cross-reference in the result
                      default: false
                      example: true
                    evidencePdf:
                      type: boolean
                      description: Request a PDF evidence bundle (availability depends on tier)
                      default: false
                      example: false
                    governanceVerdict:
                      type: boolean
                      description: Include governance verdict (default true)
                      default: true
                      example: true
      responses:
        "202":
          description: Audit job accepted and queued
          content:
            application/json:
              schema:
                type: object
                required: [success, jobId, status, message]
                properties:
                  success:
                    type: boolean
                    example: true
                  jobId:
                    type: string
                    example: "audit-acme_widgets-v1.2.0-1748692800000"
                  status:
                    type: string
                    enum: [queued]
                    example: "queued"
                  message:
                    type: string
                    example: "Compliance audit job queued for acme/widgets@v1.2.0. Poll GET /api/v1/compliance/audit/audit-acme_widgets-v1.2.0-1748692800000 for status."
        "400":
          description: Missing required fields (schemaVersion, repository, or release.tag)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Missing or invalid Authorization header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Organization has been evicted or is not registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/compliance/audit/{jobId}:
    get:
      tags: [compliance]
      summary: Retrieve audit job status and result
      description: |
        Returns the current status and full result of a compliance audit job.
        Jobs are retained in memory for 24 hours; after that the response is
        `410 Gone`. Jobs from prior server process runs are read from the durable
        NDJSON audit log file.
      operationId: getAuditJob
      security: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
          description: The job ID returned by `POST /api/v1/compliance/audit`
          example: "audit-acme_widgets-v1.2.0-1748692800000"
      responses:
        "200":
          description: Audit job found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditJobResponse'
        "404":
          description: Job ID not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "410":
          description: Job has expired and been evicted (was present within the last 24 hours)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/orgs:
    post:
      tags: [admin]
      summary: Register or update an organization
      description: |
        Registers a new organization (or updates an existing one) in the runtime
        registry without requiring a server restart. The change is immediately
        persisted to the `ORGS_FILE` on disk.

        **Authentication:** `Authorization: Bearer <ADMIN_SECRET>`
      operationId: createOrg
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrgRegistrationRequest'
      responses:
        "201":
          description: Organization registered successfully
          content:
            application/json:
              schema:
                type: object
                required: [success, message]
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Organization 'acme-corp' registered."
        "400":
          description: Missing or invalid request fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Invalid or missing admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "503":
          description: Admin endpoint disabled (ADMIN_SECRET not configured)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags: [admin]
      summary: List all registered organizations
      description: |
        Returns the full list of registered organizations. License keys are
        intentionally omitted — they are write-only secrets.

        **Authentication:** `Authorization: Bearer <ADMIN_SECRET>`
      operationId: listOrgs
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Array of registered organizations (license keys omitted)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrgEntry'
        "401":
          description: Invalid or missing admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "503":
          description: Admin endpoint disabled (ADMIN_SECRET not configured)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/orgs/{id}:
    delete:
      tags: [admin]
      summary: Remove a registered organization
      description: |
        Removes the specified organization from the in-memory registry and
        immediately flushes the updated registry to disk. Returns `204 No Content`
        on success.

        **Authentication:** `Authorization: Bearer <ADMIN_SECRET>`
      operationId: deleteOrg
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Organization ID to remove
          example: "acme-corp"
      responses:
        "204":
          description: Organization removed successfully (no body)
        "401":
          description: Invalid or missing admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "503":
          description: Admin endpoint disabled (ADMIN_SECRET not configured)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/audit-jobs:
    get:
      tags: [admin]
      summary: List in-memory audit jobs
      description: |
        Returns a summary list of all in-memory audit jobs sorted by
        `submittedAt` descending (newest first). The full `result` payload is
        omitted to keep the response compact for ops dashboards.

        Only jobs held in the current process's memory are returned; jobs from
        prior process runs are not included (use the NDJSON audit log file for
        historical queries).

        **Authentication:** `Authorization: Bearer <ADMIN_SECRET>`
      operationId: listAuditJobs
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Array of audit job summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditJobSummary'
        "401":
          description: Invalid or missing admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "503":
          description: Admin endpoint disabled (ADMIN_SECRET not configured)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
