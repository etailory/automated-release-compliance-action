services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # SESSION_SECRET — HMAC secret for signing session tokens.
      # Required in production. Generate: openssl rand -hex 32
      # Set in .env (preferred) or replace the ${...} reference below.
      - SESSION_SECRET=${SESSION_SECRET:-}
      # ADMIN_SECRET — protects the /admin/orgs endpoints (GET, POST, DELETE).
      # Required in production. Generate: openssl rand -hex 32
      - ADMIN_SECRET=${ADMIN_SECRET:-}
      # LICENSE_SECRET — license key validated from GitHub Actions.
      # When unset, any non-empty key is accepted (dev mode only).
      # Generate: openssl rand -hex 32
      - LICENSE_SECRET=${LICENSE_SECRET:-}
      # ORGS_FILE — path inside the container to the org registry JSON.
      # Default: data/orgs.json (persisted via the volume below)
      - ORGS_FILE=${ORGS_FILE:-data/orgs.json}
      # AUDIT_LOG_FILE — path inside the container to the durable audit log.
      # Default: data/audit-log.ndjson (persisted via the volume below)
      - AUDIT_LOG_FILE=${AUDIT_LOG_FILE:-data/audit-log.ndjson}
    volumes:
      # Persist org registry and audit log across container restarts.
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
