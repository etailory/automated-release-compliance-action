services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # PORT — HTTP port the server binds to. Default: 3000
      - PORT=${PORT:-3000}
      # SESSION_SECRET — HMAC secret for signing session tokens and audit signatures.
      # Required in production. Generate: openssl rand -hex 32
      - SESSION_SECRET=${SESSION_SECRET:-}
      # ADMIN_SECRET — protects the /admin/orgs endpoints (GET, POST, DELETE).
      # Required in production. Generate: openssl rand -hex 32
      - ADMIN_SECRET=${ADMIN_SECRET:-}
      # LICENSE_SECRET — license key validated from GitHub Actions.
      # When unset, any non-empty key is accepted (dev mode only).
      # Generate: openssl rand -hex 32
      - LICENSE_SECRET=${LICENSE_SECRET:-}
      # ORGS_FILE — path inside the container to the org registry JSON.
      # Default: data/orgs.json (persisted via the named volume below)
      - ORGS_FILE=${ORGS_FILE:-data/orgs.json}
      # AUDIT_LOG_FILE — path inside the container to the durable audit log.
      # Default: data/audit-log.ndjson (persisted via the named volume below)
      - AUDIT_LOG_FILE=${AUDIT_LOG_FILE:-data/audit-log.ndjson}
      # ORGS_CONFIG — JSON array to seed the org registry on startup without
      # running the admin API. Example:
      # ORGS_CONFIG=[{"id":"acme","licenseKey":"lk-secret","allowedSubs":["repo:acme/*"]}]
      - ORGS_CONFIG=${ORGS_CONFIG:-}
      # JWKS_URL — GitHub OIDC JWKS endpoint (only override for GitHub Enterprise).
      # Default: https://token.actions.githubusercontent.com/.well-known/jwks
      - JWKS_URL=${JWKS_URL:-}
      # OIDC_ISSUER — expected issuer claim in OIDC tokens.
      # Default: https://token.actions.githubusercontent.com
      - OIDC_ISSUER=${OIDC_ISSUER:-}
      # OIDC_AUDIENCE — expected audience claim in OIDC tokens. Default: governor-os
      - OIDC_AUDIENCE=${OIDC_AUDIENCE:-}
    volumes:
      # Named volume — persists org registry and audit log across restarts and
      # container replacements. Inspect with: docker volume inspect governor_os_data
      - governor_os_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  governor_os_data:
    driver: local
